services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/mini-car-catalog
      PUBLIC_API_BASE_URL: http://localhost:5001
      UPLOAD_DIR: /app/uploads
    ports:
      - "5001:5000"
    depends_on:
      - mongodb
    volumes:
      - uploads-data:/app/uploads

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  uploads-data:
